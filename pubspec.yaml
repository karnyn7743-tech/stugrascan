name: school_grading_app
description: "A Flutter application for student attendance and smart QR/OCR grading system."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # مكتبات نظام أبو الخضر للرصد الذكي (الجوال)
  excel: ^4.0.6
  path_provider: ^2.1.3
  file_picker: ^8.0.0
  mobile_scanner: ^7.2.0
  permission_handler: ^11.3.0
  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_commons: ^0.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true